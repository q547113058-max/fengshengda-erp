name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # ========== Job 1: 后端单测 + e2e（隔离 sqlite 库）==========
  backend:
    name: 后端 (NestJS + Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            frontend/package-lock.json

      - name: Install 根依赖
        run: npm ci

      - name: Install workspaces 依赖
        run: npm install --no-audit --no-fund

      - name: 后端类型检查
        run: npx tsc --noEmit -p tsconfig.json

      - name: 后端单测 (DTO 验证 + 23 cases)
        run: npx jest --config jest.config.js dto/ --no-coverage

      - name: 后端 e2e (业务流 12 cases)
        run: DB_TYPE=better-sqlite3 DB_PATH=test-erp.db npx jest --config jest.config.js e2e/ --no-coverage

      - name: 后端覆盖率
        if: github.event_name == 'push'
        run: npx jest --config jest.config.js --coverage --coverageReporters=text --coverageReporters=lcov

      - name: 上传 coverage 到 Codecov (可选)
        if: github.event_name == 'push' && env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v3
        with:
          files: ./server/coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  # ========== Job 2: 前端类型检查 + build ==========
  frontend:
    name: 前端 (Vite + React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            frontend/package-lock.json

      - name: Install 根依赖
        run: npm ci

      - name: Install workspaces 依赖
        run: npm install --no-audit --no-fund

      - name: 前端类型检查
        run: npx tsc --noEmit -p tsconfig.json

      - name: 前端 build
        run: npx vite build

      - name: 上传 build 产物 (供 review)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ========== Job 3: Docker 镜像构建验证（可选）==========
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: server/Dockerfile
          tags: fengshengda-server:ci-${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          tags: fengshengda-frontend:ci-${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========== Job 4: docker-compose 集成冒烟 ==========
  compose-smoke:
    name: docker-compose 集成
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - uses: actions/checkout@v4

      - name: 启动 compose
        run: docker compose up -d

      - name: 等服务 healthy
        run: |
          for i in {1..30}; do
            STATUS=$(docker compose ps --format json | grep -c '"Health":"healthy"' || true)
            if [ "$STATUS" -ge 3 ]; then
              echo "✅ 3 个服务全部 healthy"
              break
            fi
            echo "等待... ($i/30)"
            sleep 5
          done

      - name: 端到端冒烟测试
        run: |
          echo "=== /health ===" && curl -sf http://localhost:8080/health | head -c 200
          echo ""
          echo "=== /api/products (前 200 字符) ===" && curl -sf http://localhost:8080/api/products | head -c 200
          echo ""
          echo "=== /api/auth/login ===" && curl -s -X POST -H "Content-Type: application/json" -d '{"username":"boss","password":"demo"}' http://localhost:8080/api/auth/login -o /dev/null -w "HTTP %{http_code}\n"
          echo "=== 前端首页 (200 字符) ===" && curl -sf http://localhost:8080/ | head -c 200
          echo ""
          echo "=== /api/docs (HTML) ===" && curl -sf -o /dev/null -w "HTTP %{http_code}\n" http://localhost:8080/api/docs

      - name: 拉日志 (失败时)
        if: failure()
        run: docker compose logs --tail=200

      - name: 关停 compose
        if: always()
        run: docker compose down -v

  # ========== Job 5: Playwright 浏览器端 e2e 冒烟 ==========
  playwright:
    name: Playwright 浏览器冒烟
    runs-on: ubuntu-latest
    needs: [frontend]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            frontend/package-lock.json

      - name: Install 根依赖 + workspaces
        run: npm install --no-audit --no-fund

      - name: 启后端（test 模式，SQLite 隔离库）
        run: |
          cd ..
          cd server
          DB_TYPE=better-sqlite3 DB_PATH=/tmp/test.db PORT=3003 \
            nohup npx ts-node-dev --transpile-only src/main.ts > /tmp/server.log 2>&1 &
          for i in {1..30}; do
            if curl -sf http://localhost:3003/health > /dev/null; then
              echo "✅ server ready ($i s)"; break
            fi
            sleep 1
          done

      - name: 启前端 vite preview（serve dist）
        run: |
          npx vite build
          nohup npx vite preview --port 4173 --host 0.0.0.0 > /tmp/frontend.log 2>&1 &
          for i in {1..30}; do
            if curl -sf http://localhost:4173/ > /dev/null; then
              echo "✅ frontend ready ($i s)"; break
            fi
            sleep 1
          done

      - name: 装 Chromium
        run: npx playwright install --with-deps chromium-headless-shell

      - name: 跑 Playwright 冒烟（20 cases）
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173
          SKIP_WEBSERVER: '1'
        run: npx playwright test --config=playwright.config.ts

      - name: 上传 Playwright 报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: 收尾
        if: always()
        run: pkill -f 'ts-node-dev|vite' || true

