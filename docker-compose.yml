version: '3.9'

# 丰晟达 ERP 一键起：MySQL + NestJS 后端 + 前端（nginx 反代 + SPA）
# 启动：docker compose up -d
# 访问：http://localhost:8080
# 后端 API：http://localhost:8080/api
# Swagger 文档：http://localhost:8080/api/docs
# 演示账号：boss / demo (其它同 README)

services:
  mysql:
    image: mysql:8.0
    container_name: fengshengda-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pass_2026
      MYSQL_DATABASE: fengshengda_erp
      MYSQL_USER: erp_user
      MYSQL_PASSWORD: erp_pass_2026
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      # 主机可直接连 3306 (开发调试用)；生产可去掉
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "erp_user", "-perp_pass_2026"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: fengshengda-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3003
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: erp_user
      DB_PASS: erp_pass_2026
      DB_NAME: fengshengda_erp
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - server_uploads:/app/uploads
    ports:
      - "3003:3003"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: fengshengda-frontend
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 15s
      timeout: 3s
      retries: 5

volumes:
  mysql_data:
    driver: local
  server_uploads:
    driver: local
