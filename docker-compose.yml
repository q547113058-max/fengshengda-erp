version: '3.9'

# 丰晟达 ERP 一键起：MySQL + NestJS 后端 + 前端（nginx 反代 + SPA）
# 启动：docker compose --env-file .env.production up -d
# 访问：https://erp.example.com
#
# 密码用 docker secrets，不写在 compose 文件里
# secrets 通过 external: true 引用，部署时从 vault 注入：
#   echo "your-secret" | docker secret create db_root_password -
#   echo "your-secret" | docker secret create db_user_password -
#   echo "your-32-char-random" | docker secret create jwt_secret -

services:
  mysql:
    image: mysql:8.0
    container_name: fengshengda-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      # secrets → 文件路径（容器内）
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
      MYSQL_PASSWORD_FILE: /run/secrets/db_user_password
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-time=+08:00
    volumes:
      - mysql_data:/var/lib/mysql
    # 不再 3306 公开到主机（生产内网即可）
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USER}", "-p$(cat /run/secrets/db_user_password)"]
      interval: 10s
      timeout: 5s
      retries: 10
    secrets:
      - db_root_password
      - db_user_password

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: fengshengda-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3003
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_NAME: ${DB_NAME}
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      CORS_ORIGINS: ${CORS_ORIGINS}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - server_uploads:/app/uploads
    expose:
      - "3003"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 30s
    secrets:
      - jwt_secret

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    args:
      VITE_API_BASE: /api
    container_name: fengshengda-frontend
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 15s
      timeout: 3s
      retries: 5

volumes:
  mysql_data:
    driver: local
  server_uploads:
    driver: local

secrets:
  # 外部注入：docker secret create <name> -
  db_root_password:
    external: true
    name: fsd_db_root_password
  db_user_password:
    external: true
    name: fsd_db_user_password
  jwt_secret:
    external: true
    name: fsd_jwt_secret
