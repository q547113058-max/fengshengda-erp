# nginx + Let's Encrypt — 丰晟达 ERP 生产 HTTPS 配置
# 用法：
#   1. certbot --nginx -d erp.example.com (首次自动配证书)
#   2. cp server /etc/nginx/sites-available/erp
#   3. ln -s /etc/nginx/sites-available/erp /etc/nginx/sites-enabled/
#   4. nginx -t && systemctl reload nginx
#
# 安全头来自 Mozilla SSL Configuration Generator (intermediate)

# ========== HTTP → HTTPS 强制跳转 ==========
server {
    listen 80;
    listen [::]:80;
    server_name erp.example.com;
    return 301 https://$host$request_uri;
}

# ========== HTTPS 主体 ==========
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name erp.example.com;

    # Let's Encrypt 证书路径（certbot 自动维护）
    ssl_certificate /etc/letsencrypt/live/erp.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.example.com/privkey.pem;

    # SSL 配置（intermediate）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # 安全响应头
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://erp.example.com;" always;

    # 日志
    access_log /var/log/nginx/erp.access.log;
    error_log /var/log/nginx/erp.error.log;

    # 客户端最大上传（与 UPLOAD_MAX_MB 一致）
    client_max_body_size 25M;

    # 限流：每 IP 100 req/s（防 DoS）
    limit_req_zone $binary_remote_addr zone=erp_limit:10m rate=100r/s;
    limit_req zone=erp_limit burst=200 nodelay;

    # ========== 前端 SPA ==========
    location / {
        root /data/erp-system/frontend/dist;  # 生产前端构建产物
        try_files $uri $uri/ /index.html;     # SPA 路由
        add_header Cache-Control "no-cache";  # index.html 永远最新
    }

    # 静态资源 long-term cache
    location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|woff2?)$ {
        root /data/erp-system/frontend/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ========== 后端 API 反代 ==========
    location /api/ {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        # WebSocket / SSE 兼容
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # 超时（30s 默认对 ERP 够用）
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        # 不缓存 API
        add_header Cache-Control "no-store" always;
    }

    # ========== 上传文件（也可走后端，但 nginx 直传更高效） ==========
    location /uploads/ {
        alias /data/erp-system/server/uploads/;
        # 上传文件只允许同源访问
        add_header X-Content-Type-Options "nosniff" always;
        # 不缓存敏感文件
        expires 1d;
    }

    # ========== 健康检查（内部监控用） ==========
    location /health {
        proxy_pass http://127.0.0.1:3003/health;
        access_log off;  # 健康检查不打日志（量大）
    }

    # ========== 内部端点：只允许内网访问 ==========
    location /internal/ {
        # 限制只允许内网 IP（10.x / 192.168.x / 172.16-31.x）
        allow 10.0.0.0/8;
        allow 192.168.0.0/16;
        allow 172.16.0.0/12;
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:3003;
        proxy_set_header Host $host;
    }

    # ========== Swagger 仅内网访问 ==========
    location /api/docs {
        allow 10.0.0.0/8;
        allow 192.168.0.0/16;
        allow 172.16.0.0/12;
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:3003;
        proxy_set_header Host $host;
    }
}
